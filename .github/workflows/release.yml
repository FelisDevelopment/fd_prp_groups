name: Release

on:
    push:
        tags:
            - "v*.*.*"

jobs:
    create-release:
        name: Build and Create Tagged Release
        runs-on: ubuntu-latest
        steps:
            - name: Install archive tools
              run: sudo apt install zip

            - name: Checkout source code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ github.event.repository.default_branch }}

            - uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "pnpm"
                  cache-dependency-path: "web/pnpm-lock.yaml"

            - name: Set env
              run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

            - name: Install dependencies
              run: pnpm install --frozen-lockfile
              working-directory: web

            - name: Run build
              run: pnpm run build
              working-directory: web
              env:
                  CI: false

            - name: Bump manifest version
              run: node .github/actions/bump-manifest.js
              env:
                  TGT_RELEASE_VERSION: ${{ github.ref_name }}

            - name: Push manifest change
              uses: EndBug/add-and-commit@v8
              with:
                  add: fxmanifest.lua
                  push: true
                  author_name: Manifest Bumper
                  author_email: 41898282+github-actions[bot]@users.noreply.github.com
                  message: "chore: bump manifest version to ${{ github.ref_name }}"

            - name: Update tag ref
              uses: EndBug/latest-tag@latest
              with:
                  tag-name: ${{ github.ref_name }}

            - name: Bundle files
              run: |
                  mkdir -p ./temp/fd_prp_groups
                  mkdir -p ./temp/fd_prp_groups/web/
                  cp ./{fxmanifest.lua,init.lua,README.md} ./temp/fd_prp_groups
                  cp -r ./{bridge,composables,config,locales,modules} ./temp/fd_prp_groups
                  cp -r ./web/dist ./temp/fd_prp_groups/web/
                  cd ./temp && zip -r ../fd_prp_groups.zip ./fd_prp_groups

            - name: Create Release
              uses: "marvinpinto/action-automatic-releases@v1.2.1"
              id: auto_release
              with:
                  repo_token: "${{ secrets.GITHUB_TOKEN }}"
                  title: ${{ env.RELEASE_VERSION }}
                  prerelease: false
                  files: fd_prp_groups.zip

              env:
                  CI: false
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
